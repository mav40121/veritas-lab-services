name: Deploy Freeze Alert

# 2026-06-10: Railway is configured "wait for CI" — if any required check
# goes red on main, Railway SKIPS every deploy (skippedReason "CI check
# suite failed") and production silently freezes on the last green build.
# On 2026-06-10 this hid a 19-hour, 12-PR freeze. This workflow makes the
# freeze loud: the moment a gating workflow fails on main, it opens (or
# appends to) a GitHub issue and @-mentions the owner, who gets notified
# within minutes. Uses only the built-in GITHUB_TOKEN — no external secret.
#
# Note: workflow_run workflows execute from the DEFAULT-branch copy of this
# file, so it activates after this merges to main and will not self-test on
# its own PR. It fires on the next real CI failure on main.

on:
  workflow_run:
    workflows:
      - "Multi-Lab Mutations Audit"
      - "Typecheck"
      - "Commit Message Gate"
      - "Gate 3 Step 8 UI Evidence"
    types: [completed]

permissions:
  issues: write
  contents: read

jobs:
  alert-on-freeze:
    # Only when a gating workflow FAILED on the main branch.
    if: >-
      github.event.workflow_run.conclusion == 'failure' &&
      github.event.workflow_run.head_branch == 'main'
    runs-on: ubuntu-latest
    steps:
      - name: Open or update the deploy-freeze issue
        uses: actions/github-script@v7
        with:
          script: |
            const run = context.payload.workflow_run;
            const shaShort = run.head_sha.substring(0, 7);
            const label = 'deploy-freeze';
            const title = `Deploy frozen: CI red on main (${shaShort})`;
            const body = [
              `@mav40121 a required CI check just failed on \`main\`, so Railway's "wait for CI" is now SKIPPING every deploy. Production is frozen on the last green build until main is green again.`,
              ``,
              `- Failed workflow: **${run.name}**`,
              `- Commit: \`${run.head_sha}\``,
              `- Run logs: ${run.html_url}`,
              ``,
              `To unfreeze: fix the failing check (or revert the offending commit) and merge to main. Deploys resume automatically once the check suite is green. Close this issue when prod is confirmed current (health commit matches HEAD and a new route returns a real status, not the 200 SPA shell).`,
              ``,
              `Runbook: memory "Merge is not deploy" / docs/shape-a-class-audit-2026-06-09.md`,
            ].join('\n');

            const { owner, repo } = context.repo;

            // Ensure the label exists.
            try {
              await github.rest.issues.getLabel({ owner, repo, name: label });
            } catch (e) {
              await github.rest.issues.createLabel({
                owner, repo, name: label, color: 'b60205',
                description: 'A red check on main is blocking Railway deploys',
              });
            }

            // De-dupe: append to an existing open alert instead of spamming new issues.
            const existing = await github.rest.issues.listForRepo({
              owner, repo, state: 'open', labels: label, per_page: 1,
            });
            if (existing.data.length > 0) {
              await github.rest.issues.createComment({
                owner, repo, issue_number: existing.data[0].number, body,
              });
            } else {
              await github.rest.issues.create({ owner, repo, title, body, labels: [label] });
            }
